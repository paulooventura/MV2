================================================================================
  MIND & VENTURE — GAME DESIGN DOCUMENT
  Last updated: May 2026
  Developer: Kiko (Paulo Ventura) — Nashville, TN
================================================================================

ELEVATOR PITCH
--------------
Mind & Venture is a 2D side-scrolling platformer where you play as MIND —
a sentient studio monitor on a wheel, with a lightbulb head and cable arms —
navigating a world full of audio-connected puzzles, enemies, and secrets.
The game draws from Brazilian psychedelic art, Vedic/Jyotish cosmology,
and the East Nashville music underground scene.

OST: "Mind and Venture OST" (2018) by Paulo Ventura
Spotify: https://open.spotify.com/album/0hJ0u7LB57kHrmOnU5CIG4

================================================================================
CHARACTER: MIND
================================================================================

VISUAL DESIGN
-------------
- HEAD: Lightbulb (glass bulb, metal screw base, filament, one large eye)
  - Eye has sclera, iris, and pupil that tracks the aim direction (8 directions)
  - Pupil returns to center when no direction pressed
  - Glass is transparent — you can see through it
- BODY: Yamaha HS8 studio monitor cabinet
  - Speaker cone (woofer) on front face
  - Tweeter (small) in upper corner
  - Vertical HP/Life bar on right side of cabinet (green → orange → red)
  - Green power LED bottom corner
  - No HS8 logo (gameplay aesthetic)
- ARMS: Two thick coiled purple cables stemming from upper body (shoulder level)
  - LEFT ARM (connector/item arm): rotates to aim in 8 directions
    - Tip changes shape based on selected item (TRS, RCA, XLR, MAG)
    - Always in FRONT of body box in draw order
  - RIGHT ARM (punch arm): L-shape guard stance
    - Coil goes DOWN from shoulder, then FORWARD to fist
    - Fist is a black ball (no fingers/thumb)
    - Hold F = charge (glove recoils back, purple glow builds)
    - Release F = arm uncoils and punches forward
    - Always BEHIND body box in draw order
- WHEEL: Mountain bike tire at bottom center
  - OBS-style 3-blade purple propeller design inside chrome hub
  - Deep purple blades, chrome cross-plate center, 4 bolt holes
  - Rolls physics-driven (rotation speed = vx / circumference)
  - Still when standing, spins when moving
  - Smoke puff effect when changing direction or braking
- HAT: Wide-brim hat (Paulo Ventura signature look)
  - SHORT crown (9px), VERY wide flat brim (28px left, 30px right)
  - Brim is the dominant feature — not a top hat

UPGRADES (collected in world)
------
- ARMOR: body armor layer (from piskel 'armor' layer)
- GLOVE: boxing glove replaces ball fist on punch arm

SPRITE LAYERS (from Piskel files)
---------------------------------
Order back→front: wheel, head, arm L, body, armor, arm R, hat, glove
- 'armor' and 'glove' layers EXCLUDED from base sprite
- Added when player collects those items on the map

ANIMATIONS
----------
- Idle: 4-8 frames subtle bob (from piskel)
- Walk/Run: 6 frames with spinning wheel
- Jump: 6 frames (crouch → launch → rise → peak → fall → land)
- Land: 4 frames squash/spring
- Duck: plays through once then LOCKS on last frame while held
- Air duck: tucked pose in mid-air
- Punch (idle guard): L-shape arm, coil down then forward
- Punch (charging): arm recoils up-back, purple glow builds
- Punch (release): arm uncoils straight forward, impact flash

================================================================================
ITEMS / WEAPONS (Q to cycle, E to fire)
================================================================================

1. TRS — Laser Gun
   Connector shape: Long thin shaft with 3 rubber ring insulators (T/R/S)
   Rounded tip with glow
   Function: Fast straight laser bolt, 2× damage, no gravity
   Projectile: Silver/white beam
   Sound: High-pitched zap

2. RCA — Grappling Hook  ← CURRENT FOCUS
   Connector shape: Round red collar ring + long gold center pin protruding
   Knurled outer body
   Function: Fires cable that latches to platforms
   - W/S = reel in/out (change rope length)
   - A/D = swing left/right (pendulum physics)
   - Space = catapult release (fly off with full momentum)
   - Double-tap W = snap up to platform
   Rope: Thick braided purple cord (3 layered strokes + braid dots)
   Rope sounds: 'ropeSnap' (taut), 'ropeSlack' (loose)
   Physics: 3 states — slack (no force), tautening (gentle pull), taut (hard constraint + spring)

3. XLR — Push Pulse
   Connector shape: Fat round barrel, hollow circular face, 3 pins in triangle
   Locking collar ring with grip texture, lock button on top
   Function: Expanding arc shockwave — pushes enemies, crates, moveable platforms
   Also damages enemies in range
   Visual: Blue arc rings expanding outward
   Sound: Deep bass pulse

4. MAG — Magnet Pull
   Connector shape: Horseshoe U-shape (cartoon style)
   Curved back (bridge) on left, N/S poles pointing FORWARD (toward aim)
   Red top arm (N), blue bottom arm (S), silver pole tips
   Magnetic field arcs between poles
   Function: Pulls enemies, Knowl droplets, crates, moveable platforms toward player
   Damages enemies if pulled very close
   Sound: Low magnetic hum

================================================================================
COLLECTIBLES
================================================================================

KNOWL DROPLETS
--------------
- Glowing green teardrop-shaped collectibles
- Collect all in a zone to unlock the next area / GOAL gate
- Attracted by MAG item
- Float with sine-wave bob animation
- Sparkle/glow effect

================================================================================
WORLD DESIGN PRINCIPLES
================================================================================

- Vertical + horizontal progression
- Multiple path routes (jump over, duck under, hook swing across)
- Duck corridors: low ceiling forces crouch (auto-elastic crouch system)
- Push/pull puzzle islands: wide gaps bridgeable only with XLR/MAG + moveable platforms
- Breakable walls: punch N times to destroy, debris explosion
  - Standard jab: short reach, fast, spammable (tap F)
  - Charged hook: longer reach, 2× damage, hold F then release
- Minions: Tradzkul's fodder (circle grenadier, square shooter, flyer bat)
- Enemies: Mind-clone rivals (wheel+lightbulb, ball/square/triangle/star shapes)
  - Can be stomped (jump on head), punched, pushed (XLR), or pulled (MAG)
- Auto-moving platforms and manually-moveable platforms

PLATFORM TYPES
--------------
- 'solid': full AABB collision all 4 sides
- 'oneway': land on top only, pass through from below/sides
- 'ceil': ceiling only (force duck to pass under)

ZONES (full game, aspirational)
--------------------------------
Zone 1: Open ground floor, intro mechanics, basic enemies
Zone 2: Mid-height ledges, first hook targets
Zone 3: Push/pull puzzle islands (XLR/MAG required)
Zone 4: Vertical climb, ceiling corridors
Zone 5: Open sky section, long horizontal runs
Zone 6: Summit approach, toughest enemies
GOAL: Summit / star zone (collect all Knowl to unlock)

================================================================================
TEST CHAMBER (current build)
================================================================================

Cave layout, 1000×480px:
- Section 1: Open start area
- Passage 1: Low ceiling corridor + one block (DUCK + PUNCH to destroy, 3 HP)
- Section 2: Middle chamber (can stand)
- Passage 2: Two stacked blocks (punch both to pass)
- Section 3: Open end reward area

================================================================================
TECHNICAL NOTES
================================================================================

- Pure HTML5 Canvas, no frameworks, self-contained single file
- Pixel art rendered at 3× scale (32×32 base → 96×96 screen)
   - Physics: GRAV=0.52, WLK=3.4, RUN=8.8, GROUND_FRIC=0.52 (grippy tires on flat ground)
- Elastic crouch: crouchAmt 0→1 smooth, auto-triggered by low ceilings
- Wheel physics: rotation = vx / (2π × wheelRadius)
- Camera: smooth follow (10% lerp per frame)
- Audio: Web Audio API, procedural SFX (no samples)
- Sprite layers drawn in order: wheel → head → body → connector arm (front)
  Glove arm and head drawn BEFORE body (body covers them)

================================================================================
INSPIRATION
================================================================================

- Mega Man (connector arm as gun/weapon, screen-filling boss encounters)
- Contra (arm aims in 8 directions, projectiles from tip)
- Sunset Riders (character facing/aiming system)
- Worms 2 (rope physics, catapult launch, rope slack/tension)
- Super Mario Bros (jump feel, stomp enemies, collect items)
- Metroid (exploration, power-up unlocks, atmosphere)

================================================================================
CREATOR NOTES (Paulo Ventura / Kiko)
================================================================================

- Brazilian roots, deeply connected to Brazilian music and culture
- Based in Nashville, TN — active in East Nashville music scene
- Music producer, DJ, label owner, content creator
- Yamaha HS8 monitors are personal studio equipment (hence the body design)
- MTB wheel reference to personal aesthetic/style
- Wide-brim hat is a signature look
- The character MIND represents creative consciousness navigating the world
- Bilingual (Portuguese/English) creative direction
- Vedic/Jyotish astrology influences world themes

function _midiF(m){return 440*Math.pow(2,(m-69)/12);}
function _buildBGM(type){
  const ac=_ensureAC(); if(!ac)return null;
  const song=_PSG_SONGS[type]||_PSG_SONGS.title;
  const sr=ac.sampleRate;
  const step=60/song.bpm/2;            // 8th-note grid
  const steps=song.lead.length;
  const N=Math.ceil(sr*step*steps);
  const buf=ac.createBuffer(2,N,sr);
  const L=buf.getChannelData(0),R=buf.getChannelData(1);
  const q=v=>Math.round(Math.max(0,Math.min(1,v))*15)/15; // 16 volume levels
  // Square voice with stepped decay; slide in octaves over the note
  const sq=(t0,f,dur,amp,pan=0,slide=0)=>{
    const i0=Math.round(t0*sr),len=Math.min(Math.round(dur*sr),N-i0);
    for(let i=0;i<len;i++){
      const t=i/sr,k=t/dur;
      const ff=f*Math.pow(2,slide*k);
      const s=Math.sign(Math.sin(2*Math.PI*ff*t));
      const v=s*q(1-k*0.75)*amp;
      L[i0+i]+=v*(0.5+pan*0.5);R[i0+i]+=v*(0.5-pan*0.5);
    }
  };
  // LFSR noise drum; `low` = slower sample-hold (deeper rumble)
  const noise=(t0,dur,amp,low)=>{
    const i0=Math.round(t0*sr),len=Math.min(Math.round(dur*sr),N-i0);
    let lfsr=0x8000,hold=0,cur=1;
    const period=low?24:4;
    for(let i=0;i<len;i++){
      if(--hold<=0){const b=((lfsr&1)^((lfsr>>3)&1));lfsr=(lfsr>>>1)|(b<<15);cur=(lfsr&1)?1:-1;hold=period;}
      const v=cur*q(1-i/len)*amp;
      L[i0+i]+=v;R[i0+i]+=v;
    }
  };
  for(let st=0;st<steps;st++){
    const t=st*step;
    const b=song.bass[st%song.bass.length];
    if(b)sq(t,_midiF(b),step*0.9,0.16,-0.2);
    const m=song.lead[st%song.lead.length];
    if(m)sq(t,_midiF(m),step*0.85,0.11,0.25);
    const d=song.drums?song.drums[st%song.drums.length]:'.';
    if(d==='K'){sq(t,110,0.09,0.2,0,-2);noise(t,0.05,0.1,true);}
    else if(d==='S')noise(t,0.09,0.15,false);
    else if(d==='H')noise(t,0.03,0.06,false);
  }
  // Hard clip — a PSG mixes flat, no analog warmth
  for(let i=0;i<N;i++){
    L[i]=Math.max(-0.85,Math.min(0.85,L[i]));
    R[i]=Math.max(-0.85,Math.min(0.85,R[i]));
  }
  return buf;
}

const _psgZoneBufs={};
function _procBuf(type){
  if(type==='game'){
    const k='zone'+Math.max(0,Math.min(5,_zoneIdx));
    return _psgZoneBufs[k]||(_psgZoneBufs[k]=_buildBGM(k));
  }
  if(type==='story') return _storyBuf||(_storyBuf=_buildBGM('story'));
  return _titleBuf||(_titleBuf=_buildBGM('title'));
}

function _startProcBgm(type,vol){
  if(!_audioUnlocked) return;
  const ac=_ensureAC(); if(!ac)return;
  const isGame=type==='game';
  if(isGame){
    if(_gameSrc){try{_gameSrc.stop();}catch(e){} _gameSrc=null;}
    if(_gameAudioEl){_gameAudioEl.pause();_gameAudioEl.currentTime=0;}
  }else{
    if(_titleSrc){try{_titleSrc.stop();}catch(e){} _titleSrc=null;}
    if(_openingAudioEl){_openingAudioEl.pause();_openingAudioEl.currentTime=0;}
    if(_storyAudioEl){_storyAudioEl.pause();_storyAudioEl.currentTime=0;}
  }
  const buf=_procBuf(type); if(!buf)return;
  const node=ac.createBufferSource();
  node.buffer=buf; node.loop=true;
  let gain=isGame?_gameGain:_titleGain;
  if(!gain){gain=ac.createGain();gain.connect(ac.destination);if(isGame)_gameGain=gain;else _titleGain=gain;}
  gain.gain.value=vol;
  node.connect(gain);
  node.start(0);
  if(isGame)_gameSrc=node; else _titleSrc=node;
}

function _playBGM(type,vol=0.7){
  _unlockAudio();
  _activeBgmType=type;
  const useProc=()=>_startProcBgm(type,vol);
  if(OPT.musicMode==='psg'){ useProc(); return; }
  if(_mp3Failed[type]){ useProc(); return; }

  const playReadyEl=(el)=>{
    if(_activeBgmType!==type) return;
    if(type==='game'&&_gameSrc){try{_gameSrc.stop();}catch(e){} _gameSrc=null;}
    else if(_titleSrc){try{_titleSrc.stop();}catch(e){} _titleSrc=null;}
    el.loop=(type==='title'||type==='story');
    el.currentTime=0;
    el.playbackRate=1;
    el.volume=Math.max(0,Math.min(1,vol));
    const p=el.play();
    if(p) p.then(()=>{
      if(type==='game'&&_gameSrc){try{_gameSrc.stop();}catch(e){} _gameSrc=null;}
      else if(_titleSrc){try{_titleSrc.stop();}catch(e){} _titleSrc=null;}
      if(type==='title') _titleMusicPlaying=true;
    }).catch(()=>{
      if(el.readyState>=2){
        if(type==='title') _titleMusicPlaying=false;
        return;
      }
      _onBgmTrackError(type,_bgmPathFor(type));
    });
    else if(_activeBgmType===type) useProc();
  };

  let el=type==='game'?_gameAudioEl:type==='story'?_storyAudioEl:_openingAudioEl;
  if(!el) el=_mp3Pool[type];
  if(!el){
    const path=_pickBgmPath(type,_bgmPathFor(type));
    if(path) el=_loadBgmElement(type,path);
  }
  if(el){
    if(type==='game') _gameAudioEl=el;
    else if(type==='story') _storyAudioEl=el;
    else _openingAudioEl=el;
    if(el.readyState>=2) playReadyEl(el);
    else{
      const ready=()=>{ el.removeEventListener('canplay',ready); el.removeEventListener('error',fail); playReadyEl(el); };
      const fail=()=>{ el.removeEventListener('canplay',ready); _onBgmTrackError(type,el.src); };
      el.addEventListener('canplay',ready,{once:true});
      el.addEventListener('error',fail,{once:true});
    }
    return;
  }
  useProc();
}
function _bgmPathFor(type){
  return type==='game'?_gameMusicPath:type==='story'?_storyMusicPath:_titleMusicPath;
}
function _stopBGM(type){
  if(type==='title'){
    if(_titleSrc){try{_titleSrc.stop();}catch(e){}_titleSrc=null;}
    if(_openingAudioEl){_openingAudioEl.pause();_openingAudioEl.currentTime=0;}
  }
  if(type==='story'){
    if(_titleSrc){try{_titleSrc.stop();}catch(e){}_titleSrc=null;}
    if(_storyAudioEl){_storyAudioEl.pause();_storyAudioEl.currentTime=0;}
  }
  if(type==='game'){
    if(_gameSrc){try{_gameSrc.stop();}catch(e){}_gameSrc=null;}
    if(_gameAudioEl){_gameAudioEl.pause();_gameAudioEl.currentTime=0;}
  }
}
function updateGameBgm(){
  if(_gameState!=='game')return;
  const f=Math.max(0.3,_healFrac);
  const mv=Math.max(0,Math.min(1,OPT.musicVol||0.75));
  if(_gameAudioEl){
    _gameAudioEl.volume=Math.max(0.05,mv*f);
    _gameAudioEl.playbackRate=Math.max(0.5,f);
    return;
  }
  if(!_gameGain)return;
  _gameGain.gain.value=Math.max(0.05,mv*f);
  if(_gameSrc)_gameSrc.playbackRate.value=Math.max(0.5,f);
}
function _applyBgmVolumes(){
  const mv=Math.max(0,Math.min(1,OPT.musicVol||0.75));

  if(_storyAudioEl&&!_storyAudioEl.paused) _storyAudioEl.volume=mv*0.55;
  if(_gameAudioEl&&!_gameAudioEl.paused) _gameAudioEl.volume=mv*0.75;

  if(_gameGain) _gameGain.gain.value=mv*0.75;
}

    if(e.code==='ArrowDown'||e.code==='KeyS'){_optRow=(_optRow+1)%optRows;e.preventDefault();return;}
    const dec=e.code==='ArrowLeft'||e.code==='KeyA';

    p.push([parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)]);
  };
  Object.values(C).forEach(add);
  ['#122040','#183050','#286878','#4898a8','#78c8d8','#a83898','#c858b0','#38c8b0','#78e8d8','#f8d878'].forEach(add);

function _smsNearestRGB(r,g,b){
  let best=0,bd=1e9;
  for(let i=0;i<_ART_RGB_PAL.length;i++){
    const pr=_ART_RGB_PAL[i][0],pg=_ART_RGB_PAL[i][1],pb=_ART_RGB_PAL[i][2];
    const dr=r-pr,dg=g-pg,db=b-pb;
    const d=dr*dr*0.30+dg*dg*0.59+db*db*0.11;
    if(d<bd){bd=d;best=i;}
  }
  return _ART_RGB_PAL[best];
}
function _isPalettePixel(r,g,b){
  for(let i=0;i<_ART_RGB_PAL.length;i++){
    const p=_ART_RGB_PAL[i];
    if(p[0]===r&&p[1]===g&&p[2]===b)return true;
  }
  return false;
}
function _smsSnapImageData(id){
  const d=id.data;
  for(let i=0;i<d.length;i+=4){
    if(d[i+3]<128){d[i+3]=0;continue;}
    const r=d[i],g=d[i+1],b=d[i+2];
    if(_isPalettePixel(r,g,b)){d[i+3]=255;continue;}
    const snap=_smsNearestRGB(r,g,b);
    d[i]=snap[0];d[i+1]=snap[1];d[i+2]=snap[2];d[i+3]=255;
  }
  return id;
}
function _offCanvas(w,h){
  const c=document.createElement('canvas');c.width=w;c.height=h;
  const g=c.getContext('2d');g.imageSmoothingEnabled=false;
  return {c,g};
}
// Integer-step nearest-neighbor downscale — preserves crisp pixel-art edges.
function smsDownscaleNN(img,tw,th){
  let w=img.width,h=img.height,cur=img;
  while(w>tw*2||h>th*2){
    const nw=Math.max(tw,w>>1),nh=Math.max(th,h>>1);
    const {c,g}=_offCanvas(nw,nh);
    g.drawImage(cur,0,0,w,h,0,0,nw,nh);
    w=nw;h=nh;cur=c;
  }
  if(w!==tw||h!==th){
    const {c,g}=_offCanvas(tw,th);
    g.drawImage(cur,0,0,w,h,0,0,tw,th);
    return c;
  }
  if(cur===img){
    const {c,g}=_offCanvas(w,h);
    g.drawImage(img,0,0);
    return c;
  }
  return cur;
}
/* Process pixel-art assets — MV2 keeps full color; MV1 path snaps to curated palette. */
function smsProcessPixelArt(img,dw,dh){
  const tw=dw||img.width, th=dh||img.height;
  const c=(tw===img.width&&th===img.height)
    ?(()=>{const o=_offCanvas(tw,th);o.g.drawImage(img,0,0);return o.c;})()
    :smsDownscaleNN(img,tw,th);
  if(!MV2_VISUAL){
    try{
      const g=c.getContext('2d');
      g.putImageData(_smsSnapImageData(g.getImageData(0,0,c.width,c.height)),0,0);
    }catch(e){}
  }
  return c;
}
/* Process painted art (backgrounds, story). */
function smsProcessPainted(img,dw,dh){
  const c=smsDownscaleNN(img,dw||img.width,dh||img.height);
  if(!MV2_VISUAL){
    try{
      const g=c.getContext('2d');
      g.putImageData(_smsSnapImageData(g.getImageData(0,0,c.width,c.height)),0,0);
    }catch(e){}
  }
  return c;
}
function smsQuantizeImage(img,dw,dh,smooth){
  return smooth?smsProcessPainted(img,dw||img.width,dh||img.height)
               :smsProcessPixelArt(img,dw||img.width,dh||img.height);
}
function smsHexQ(r,g,b){
  const snap=_smsNearestRGB(r,g,b);
  const h=v=>('0'+v.toString(16)).slice(-2);
  return '#'+h(snap[0])+h(snap[1])+h(snap[2]);
}

/* ── SPRITE ENGINE — palette-indexed string art → canvases ── */
function mkSpr(rows,pal){
  const h=rows.length,w=rows[0].length;
  const c=document.createElement('canvas');c.width=w;c.height=h;
  const g=c.getContext('2d');g.imageSmoothingEnabled=false;
  for(let y=0;y<h;y++){const r=rows[y];
    for(let x=0;x<w;x++){const ch=r[x];
      if(ch==='.'||ch===' ')continue;
      g.fillStyle=pal[ch]||'#ff00ff';g.fillRect(x,y,1,1);}}
  return c;
}
function flipSpr(spr){
  const c=document.createElement('canvas');c.width=spr.width;c.height=spr.height;
  const g=c.getContext('2d');g.imageSmoothingEnabled=false;
  g.translate(spr.width,0);g.scale(-1,1);g.drawImage(spr,0,0);
  return c;
}
function whiteSpr(spr){ // hit-flash silhouette
  const c=document.createElement('canvas');c.width=spr.width;c.height=spr.height;
  const g=c.getContext('2d');g.imageSmoothingEnabled=false;
  g.drawImage(spr,0,0);
  g.globalCompositeOperation='source-in';
  g.fillStyle='#ffffff';g.fillRect(0,0,c.width,c.height);
  return c;
}
function blitImg(src,sx0,sy0,sw0,sh0,dx,dy,dw,dh){
  ctx.imageSmoothingEnabled=false;
  // +1px bleed kills sub-pixel seams between adjacent tiles
  const bleed=dw>1&&dh>1?1:0;
  ctx.drawImage(src,sx0,sy0,sw0,sh0,dx|0,dy|0,dw+bleed,dh+bleed);
}
function blit(spr,x,y){ctx.imageSmoothingEnabled=false;ctx.drawImage(spr,x|0,y|0);}
function blitFlip(spr,x,y,flip){
  if(!flip){blit(spr,x,y);return;}
  ctx.imageSmoothingEnabled=false;
  ctx.save();ctx.translate((x|0)+spr.width,y|0);ctx.scale(-1,1);
  ctx.drawImage(spr,0,0);ctx.restore();
}
// Plot a chunky pixel line (no anti-aliasing, SMS-pure).
function pxLine(x0,y0,x1,y1,col,th=1){
  x0|=0;y0|=0;x1|=0;y1|=0;
  const dx=Math.abs(x1-x0),dy=Math.abs(y1-y0);
  const sxp=x0<x1?1:-1,syp=y0<y1?1:-1;
  let err=dx-dy,n=0;
  ctx.fillStyle=col;
  while(n++<512){
    ctx.fillRect(x0,y0,th,th);
    if(x0===x1&&y0===y1)break;
    const e2=err*2;
    if(e2>-dy){err-=dy;x0+=sxp;}
    if(e2<dx){err+=dx;y0+=syp;}
  }
}
// 50% checkerboard dither fill — the SMS way to fake transparency.
// Uses cached 2×2 repeat patterns (fast even full-screen); the pattern
// is anchored to the framebuffer so parity is absolute.
const _ditherPats={};
function _ditherPat(col,ph){
  const key=col+'|'+ph;
  let pat=_ditherPats[key];
  if(!pat){
    const c=document.createElement('canvas');c.width=2;c.height=2;
    const g=c.getContext('2d');
    g.fillStyle=col;
    if(ph){g.fillRect(1,0,1,1);g.fillRect(0,1,1,1);}
    else{g.fillRect(0,0,1,1);g.fillRect(1,1,1,1);}
    pat=_ditherPats[key]=ctx.createPattern(c,'repeat');
  }
  return pat;
}
function ditherRect(x,y,w,h,col,phase=0){
  x|=0;y|=0;w|=0;h|=0;
  if(w<=0||h<=0)return;
  ctx.fillStyle=_ditherPat(col,phase&1);
  ctx.fillRect(x,y,w,h);
}

const FONT3=(()=>{
  const raw={
    A:'010101111101101',B:'110101110101110',C:'011100100100011',D:'110101101101110',
    E:'111100110100111',F:'111100110100100',G:'011100101101011',H:'101101111101101',
    I:'111010010010111',J:'001001001101010',K:'101101110101101',L:'100100100100111',
    M:'101111111101101',N:'110101101101101',O:'010101101101010',P:'110101110100100',
    Q:'010101101110011',R:'110101110110101',S:'011100010001110',T:'111010010010010',
    U:'101101101101111',V:'101101101101010',W:'101101111111101',X:'101101010101101',
    Y:'101101010010010',Z:'111001010100111',
    0:'111101101101111',1:'010110010010111',2:'111001111100111',3:'111001111001111',
    4:'101101111001001',5:'111100111001111',6:'111100111101111',7:'111001001010010',
    8:'111101111101111',9:'111101111001111',
    ' ':'000000000000000','.':'000000000000010',',':'000000000010100',
    '!':'010010010000010','?':'110001010000010',':':'000010000010000',';':'000010000010100',
    '-':'000000111000000','+':'000010111010000','/':'001001010100100','\'':'010010000000000',
    '"':'101101000000000','(':'001010010010001',')':'100010010010100','&':'010101010101011',
    '%':'101001010100101','>':'100010001010100','<':'001010100010001','=':'000111000111000',
    '*':'000101010101000','_':'000000000000111','#':'101111101111101',
  };
  const f={};
  for(const k in raw){
    const bits=raw[k],px=[];
    for(let i=0;i<15;i++)if(bits[i]==='1')px.push([i%3,(i/3)|0]);
    f[k]=px;
  }
  return f;
})();
function drawText(s,x,y,col,scl=1){
  s=String(s).toUpperCase();
  x|=0;y|=0;
  ctx.fillStyle=col;
  for(let i=0;i<s.length;i++){
    const px=FONT3[s[i]]||FONT3['.'];
    const gx=x+i*4*scl;
    for(const [cx2,cy2] of px)ctx.fillRect(gx+cx2*scl,y+cy2*scl,scl,scl);
  }
}
function textW(s,scl=1){return String(s).length*4*scl-scl;}
function drawTextC(s,cx,y,col,scl=1){drawText(s,Math.round(cx-textW(s,scl)/2),y,col,scl);}
function drawTextR(s,rx,y,col,scl=1){drawText(s,Math.round(rx-textW(s,scl)),y,col,scl);}
// Word-wrap for the 3×5 bitmap font (Phantasy Star–style dialogue boxes).
function wrapBitmapText(text,maxW,scl=1){
  const words=String(text).toUpperCase().split(' ');
  const lines=[]; let cur='';
  for(const w of words){
    const test=cur?(cur+' '+w):w;
    if(textW(test,scl)<=maxW) cur=test;
    else{if(cur)lines.push(cur);cur=w;}
  }
  if(cur)lines.push(cur);
  return lines;
}
function wrapBitmapBlocks(blocks,maxW,scl=1){
  const out=[];
  for(const b of blocks) wrapBitmapText(b,maxW,scl).forEach(l=>out.push(l));
  return out;
}

const GP={pad:null,prev:{},ignore:{}};

window.addEventListener('gamepadconnected', e=>{
  GP.pad=e.gamepad;
  // Calibrate: snapshot which buttons are already firing at rest — ignore them forever
  setTimeout(()=>{
    const pads=navigator.getGamepads();
    const g=pads[GP.pad.index];
    if(!g) return;
    GP.ignore={};
    g.buttons.forEach((b,i)=>{ if(b.value>0.1) GP.ignore[i]=true; });
    console.log('GP connected. Ignoring resting buttons:', Object.keys(GP.ignore));
  }, 200);
});
window.addEventListener('gamepaddisconnected',e=>{GP.pad=null;});

function readGamepad(){
  if(!GP.pad) return;
  const pads=navigator.getGamepads();
  if(!pads) return;
  const g=pads[GP.pad.index];
  if(!g) return;

  const DEAD=0.5;
  const ax=Math.abs(g.axes[0]||0)>DEAD ? g.axes[0] : 0;
  const ay=Math.abs(g.axes[1]||0)>DEAD ? g.axes[1] : 0;

  // Only fire button if NOT in ignore list
  const pressed=i=>!GP.ignore[i] && g.buttons[i]&&g.buttons[i].pressed===true;
  const rose=i=>pressed(i)&&!GP.prev[i];

  // Left stick
  if(ax<0) K['KeyA']=true; else if(!g.buttons[14]?.pressed) K['KeyA']=false;
  if(ax>0) K['KeyD']=true; else if(!g.buttons[15]?.pressed) K['KeyD']=false;
  if(ay<0) K['KeyW']=true; else if(!g.buttons[12]?.pressed) K['KeyW']=false;
  if(ay>0) K['KeyS']=true; else if(!g.buttons[13]?.pressed) K['KeyS']=false;

  // D-pad
  if(pressed(14)) K['KeyA']=true;
  if(pressed(15)) K['KeyD']=true;
  if(pressed(12)) K['KeyW']=true;
  if(pressed(13)) K['KeyS']=true;

  // B(0)=jump — track controller state separately
  const bJump=pressed(0);
  if(bJump&&!GP.prev[0]){Kj['Space']=true;}
  // Merge: Space = keyboard OR controller
  K['Space']=(K['Space_kb']||bJump);

  // A(1)=cycle items
  if(rose(1)) Kj['KeyE']=true;

  // Y(3)=fire/hold item — rising edge AND held state for XLR/MAG
  if(rose(3)) Kj['KeyQ']=true;
  // Y(3)=fire/hold — merge with keyboard
  K['KeyQ']=(K['KeyQ_kb']||pressed(3));

  // X(2)=punch — hold for charge
  K['KeyF']=(K['KeyF_kb']||pressed(2));

  // ZL(4)=duck
  if(pressed(4)) K['KeyS']=true;

  // +(9)=reset
  if(rose(9)) Kj['Tab']=true;
  if(_gameState==='title'){
    if(!_titleMusicPlaying&&rose(0)) _onInteract();
    else if(_titleMusicPlaying){
      if(rose(12)) _titleMenuIdx=(_titleMenuIdx+TITLE_MENU_ITEMS.length-1)%TITLE_MENU_ITEMS.length;
      if(rose(13)) _titleMenuIdx=(_titleMenuIdx+1)%TITLE_MENU_ITEMS.length;
      if(rose(0)) _titleMenuActivate();
    }
  }else if((_gameState==='story'||_gameState==='select')&&rose(0)) startGame();
  if(_gameState==='select'){
    if(rose(14)){if(_selectStep===0)_playerCount=1;else _heroChoice='mind';}
    if(rose(15)){if(_selectStep===0)_playerCount=2;else _heroChoice='venture';}
  }

  [0,1,2,3,4,9,12,13,14,15].forEach(i=>GP.prev[i]=pressed(i));
}

/* ── AUDIO — PSG (SN76489 in spirit: square tones + LFSR noise) ── */
function ga(){return _ensureAC();}
let _psgNoiseBuf=null,_psgPerBuf=null;
function _psgBuffers(a){
  if(_psgNoiseBuf) return;
  const len=a.sampleRate|0;
  // White noise from a 16-bit LFSR, like the SN76489 noise channel
  _psgNoiseBuf=a.createBuffer(1,len,a.sampleRate);
  const d=_psgNoiseBuf.getChannelData(0);
  let lfsr=0x8000;
  for(let i=0;i<len;i++){
    const b=((lfsr&1)^((lfsr>>3)&1));
    lfsr=(lfsr>>>1)|(b<<15);
    d[i]=(lfsr&1)?0.6:-0.6;
  }
  // Periodic ("buzz") noise mode
  _psgPerBuf=a.createBuffer(1,len,a.sampleRate);
  const e=_psgPerBuf.getChannelData(0);
  for(let i=0;i<len;i++)e[i]=(i%96<6)?0.7:-0.12;
}
function _psgVol(v){return Math.round(Math.max(0,Math.min(1,v))*15)/15;} // 16 attenuation steps
function sfx(t){
  if(!_audioUnlocked) return;
  const sampleAlias={
    jump:'jump_reg',
    hurt:'player_hit',
    knowl:'knowl_pickup',
  };
  const sampleKey=sampleAlias[t]||t;
  if(SFX_SAMPLE_PATHS[sampleKey]&&_playSfxSample(sampleKey)) return;
  const a=ga();if(!a)return;const n=a.currentTime;
  const sv=Math.max(0,Math.min(1,OPT.sfxVol||1));
  _psgBuffers(a);
  // Square tone: pitch + volume stepped at 60Hz like a PSG register write per frame
  const o=(f,ef,d,v,dt=0,type='square')=>{
    const osc=a.createOscillator(),g=a.createGain();
    osc.type=type;osc.connect(g);g.connect(a.destination);
    const t0=n+dt,steps=Math.max(1,Math.round(d*60));
    for(let i=0;i<steps;i++){
      const tt=t0+d*i/steps,k=i/steps;
      osc.frequency.setValueAtTime(Math.max(20,f+(ef-f)*k),tt);
      g.gain.setValueAtTime(_psgVol(v*(1-k))*sv*0.5,tt);
    }
    g.gain.setValueAtTime(0,t0+d);
    osc.start(t0);osc.stop(t0+d+.01);
  };
  // Noise burst: white or periodic, stepped decay
  const nz=(d,v,periodic,rate,dt=0)=>{
    const src=a.createBufferSource(),g=a.createGain();
    src.buffer=periodic?_psgPerBuf:_psgNoiseBuf;
    src.loop=true;src.playbackRate.value=rate||1;
    src.connect(g);g.connect(a.destination);
    const t0=n+dt,steps=Math.max(1,Math.round(d*60));
    for(let i=0;i<steps;i++)g.gain.setValueAtTime(_psgVol(v*(1-i/steps))*sv*0.5,t0+d*i/steps);
    g.gain.setValueAtTime(0,t0+d);
    src.start(t0);src.stop(t0+d+.02);
  };
  switch(t){
    case'jump':o(150,650,.09,.16);break;
    case'land':nz(.06,.16);o(90,55,.05,.1);break;
    case'punch':nz(.07,.18,false,0.75);o(165,52,.07,.13,0,'square');o(82,38,.05,.09,0.02,'triangle');break;
    case'hook':o(210,430,.16,.11,0,'triangle');o(130,290,.2,.07,0.03,'sine');nz(.14,.09,false,0.45);break;
    case'hook_charged':o(95,360,.14,.16,0,'triangle');o(55,220,.22,.1,0.04,'sine');nz(.16,.12,false,0.38);break;
    case'hook_latch':nz(.11,.24,false,0.32);o(118,52,.11,.15,0,'square');o(72,40,.08,.09,0.025,'triangle');break;
    case'laser':nz(.05,.24,false,1.6);o(1180,380,.13,.14,0,'sawtooth');o(760,160,.07,.08,0.04,'square');break;
    case'laser_bounce':{const r=arguments[1]||0,base=600*Math.pow(0.66,r);
      o(base*1.4,base*0.4,.08,.1*Math.pow(0.68,r));break;}
    case'laser_charge':{const cf=arguments[1]||0;o(320+cf*780,360+cf*820,.05,.03+cf*.04);break;}
    case'laser_charged_fire':nz(.1,.2,false,1.2);o(920,120,.24,.18,0,'sawtooth');o(420,80,.18,.12,0.05,'square');o(1800,90,.12,.1,0.08,'triangle');break;
    case'xlr':o(200,640,.15,.14);break;
    case'mag':o(460,130,.12,.12);break;
    case'hit':o(240,90,.06,.1);nz(.04,.1);break;
    case'stomp':o(200,60,.08,.14);nz(.05,.12,true);break;
    case'hurt':o(340,90,.12,.12);nz(.08,.08,true,0.7);break;
    case'knowl':o(660,660,.06,.1);o(880,880,.06,.1,.06);o(1320,1320,.08,.09,.12);break;
    case'knowl_pickup':o(523,523,.06,.12);o(659,659,.06,.11,.06);o(784,784,.06,.1,.12);o(1047,1047,.1,.1,.18);break;
    case'ping':o(1100,1100,.06,.09);break;
    case'ropeSnap':o(300,820,.05,.13);break;
    case'ropeBreak':o(150,60,.1,.16);nz(.08,.14);break;
    case'crank':o(180,140,.03,.06);break;
    case'ropeSlack':o(180,90,.1,.07);break;
    case'click':o(980,980,.03,.06);break;
    case'chargeReady':o(392,392,.07,.11);o(523,523,.09,.1,.07);break;
    case'unlock':[523,659,784,1047,1319].forEach((f,i)=>o(f,f,.1,.1,i*.09));break;
  }

// Rolling contact: arc length = radius × angle → one full turn (2π) covers 2π·WHEEL_R ground.
function _groundYAtWheel(pl,ahead){
  if(!pl) return null;
  const cx=pl.x+SW/2+(ahead||0);
  const feet=pl.y+FEET_OFF;
  const fL=cx-WHEEL_R*0.6,fR=cx+WHEEL_R*0.6;
  let best=null;
  if(COLL_SEGS.length){
    for(const seg of COLL_SEGS){
      const y=_segSupportAt(seg,[cx,fL,fR]);
      if(y===null) continue;
      if(feet>y+COLL_LEDGE_STEP+8) continue;
      if(feet<y-28) continue;
      if(best===null||y>best) best=y;
    }
  }
  for(const plat of allP()){
    if(plat.tp!=='solid') continue;
    if(fR<=plat.x||fL>=plat.x+plat.w) continue;
    if(plat.poly&&plat.h>32) continue;
    if(feet>plat.y+plat.h+COLL_LEDGE_STEP) continue;
    if(feet<plat.y-28) continue;
    const top=plat.y;
    if(best===null||top>best) best=top;
  }
  return best;
}
function _applyWheelGroundContact(pl){
  if(!pl||(pl.hook&&pl.hook.st==='on')||pl.wallGrip>0) return;
  const dir=Math.sign(pl.vx||0)||1;
  const gNow=_groundYAtWheel(pl,0);
  const gAhead=_groundYAtWheel(pl,dir*WHEEL_R*0.9);
  const targetY=gNow===null?gAhead:(gAhead===null?gNow:Math.max(gNow,gAhead));
  if(targetY===null) return;
  const feet=pl.y+FEET_OFF;
  const rise=targetY-feet;
  if(rise>0&&rise<=SUSP_ROLL_MAX&&(pl.og||pl.vy>=0)&&Math.abs(pl.vx)>0.15){
    pl.y+=rise*0.72;
    pl.suspComp=Math.min(1,(pl.suspComp||0)+rise/SUSP_ROLL_MAX*0.62);
    pl.og=true;
    if(pl.vy>0) pl.vy=0;
  }else if(Math.abs(rise)<=14&&(pl.og||pl.vy>=0)){
    pl.y+=(targetY-feet)*0.88;
    pl.og=true;
    if(pl.vy>0) pl.vy=0;
  }
}
function _updateWheelSuspension(pl,prevVx){
  if(!pl) return;
  let target=0.14;
  if(pl.hook&&pl.hook.st==='on') target=0.5;
  else if(!pl.og&&!pl._onSlope) target=0.68+Math.min(0.3,Math.abs(pl.vy)*0.035);
  else if(pl.og){
    const spd=Math.abs(pl.vx||0);
    if(pl.landF>0) target=0.32+Math.min(0.58,(pl._landAmp||0.45)*0.9);
    else if(spd>0.25) target=0.1+Math.sin(fr*0.4+pl.x*0.035)*0.09*Math.min(1,spd/WLK);
    const dir=Math.sign(pl.vx||0)||1;
    const gNow=_groundYAtWheel(pl,0), gAhead=_groundYAtWheel(pl,dir*WHEEL_R*0.85);
    if(gNow!==null&&gAhead!==null){
      const bump=Math.max(0,gAhead-gNow);
      if(bump>0) target=Math.min(1,target+bump/SUSP_ROLL_MAX*0.75);
    }
  }
  const stiff=pl.og?SUSP_STIFF:SUSP_STIFF*0.65;
  pl.suspVel=(pl.suspVel||0)+((target-(pl.suspComp||0))*stiff);
  pl.suspVel*=(pl.og?SUSP_DAMP:0.76);
  pl.suspComp=Math.max(0,Math.min(1,(pl.suspComp||0)+pl.suspVel));
  const accel=(pl.vx||0)-(prevVx||0);
  const tiltTgt=pl.og?Math.sign(pl.vx||0)*Math.min(0.38,Math.abs(pl.vx)/RUN*0.34)+accel*0.04:0;
  pl.suspTilt=((pl.suspTilt||0)+(tiltTgt-(pl.suspTilt||0))*0.16);
}
function _rollWheelFromTravel(pl,x0,y0){
  if(!pl) return;
  if(pl.hook&&pl.hook.st==='on') return;
  if(pl.wallGrip>0) return;
  if(pl.xlrOn||pl.magOn) return; // item use: energy on the arm only, wheel stays planted
  if(!pl.og&&!pl._onSlope) return;
  const dx=pl.x-x0, dy=pl.y-y0;
  if(Math.abs(dx)<0.01) return;
  const dist=pl._onSlope?Math.hypot(dx,dy):Math.abs(dx);
  pl.wheelAngle=(pl.wheelAngle||0)+Math.sign(dx)*dist/WHEEL_R;

function _circleRectOverlap(cx,cy,r,rx,ry,rw,rh){

function _resolveHeadCeiling(pl){

function _normPlat(t){

const COLL_SEAM=8;
const COLL_MOVE_STEP=4;
const COLL_LEDGE_STEP=56;
let COLL_SEGS=[];
let COLL_POLYS=[];
let _useSegGround=false;
function _feetSamples(pl){

}
function _buildTopWalkSegs(pts){
  const segs=[];
  for(let i=0;i<pts.length;i++){
    const a=pts[i],b=pts[(i+1)%pts.length];
    const dx=b.x-a.x,dy=b.y-a.y,len=Math.hypot(dx,dy);
    if(len<3) continue;
    const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
    const sample=Math.max(8,len*0.12);
    const inBelow=_pointInPoly(mx,my+sample,pts);
    const inAbove=_pointInPoly(mx,my-sample,pts);
    if(inAbove||!inBelow) continue;
    const angle=Math.atan2(dy,dx);
    if(Math.abs(Math.cos(angle))<0.05) continue;
    const ux=dx/len,uy=dy/len,pad=COLL_SEAM*0.5;
    segs.push({id:segs.length,x1:a.x-ux*pad,y1:a.y-uy*pad,x2:b.x+ux*pad,y2:b.y+uy*pad,len:len+pad*2,angle,ux,uy});
  }
  return segs;
}
function _segYAtX(seg,x){
  const {x1,y1,x2,y2}=seg;
  const minX=Math.min(x1,x2)-COLL_SEAM,maxX=Math.max(x1,x2)+COLL_SEAM;
  if(x<minX||x>maxX) return null;
  const dx=x2-x1;
  if(Math.abs(dx)<0.25) return null;
  const t=(x-x1)/dx;
  if(t<-0.01||t>1.01) return null;
  return y1+t*(y2-y1);
}
function _segSupportAt(seg,samples){
  const ys=[];
  for(const x of samples){
    const y=_segYAtX(seg,x);
    if(y!==null) ys.push(y);
  }
  if(!ys.length) return null;
  return Math.max(...ys);
}
function _querySegGround(pl,feet,prevFeet,landSlop){
  if(!COLL_SEGS.length) return null;
  const samples=_feetSamples(pl);
  let best=null;
  for(const seg of COLL_SEGS){
    const y=_segSupportAt(seg,samples);
    if(y===null) continue;
    if(prevFeet!==null&&prevFeet>y+landSlop){
      const drop=prevFeet-y;
      if(drop>COLL_LEDGE_STEP) continue;
      if(pl.vy<-0.4&&drop>10) continue;
    }
    if(feet<y-12) continue;
    if(feet>y+Math.max(40,COLL_LEDGE_STEP)) continue;
    const stick=pl._groundSeg===seg?0.4:0;
    if(!best||y+stick>best.y) best={y,seg,angle:seg.angle};
  }
  return best;
}
function _walkableYForPlayer(pl){
  const feet=pl.y+FEET_OFF;
  const fL=pl.x+FEET_L,fR=fL+FEET_W;
  let best=null;
  if(COLL_SEGS.length){
    const samples=_feetSamples(pl);
    for(const seg of COLL_SEGS){
      const y=_segSupportAt(seg,samples);
      if(y===null) continue;
      if(feet>y+COLL_LEDGE_STEP+8) continue;
      if(feet<y-18) continue;
      if(best===null||y>best) best=y;
    }
  }
  if(best===null){
    for(const plat of allP()){
      if(plat.tp!=='solid') continue;
      if(!_feetSpanOver(plat,fL,fR)) continue;
      if(plat.poly&&plat.h>28) continue;
      if(feet>plat.y+plat.h+COLL_LEDGE_STEP) continue;
      if(feet<plat.y-18) continue;
      const top=plat.y;
      if(best===null||top>best) best=top;
    }
  }
  return best;
}
function _surfaceUnderFeet(pl){
  const feet=pl.y+FEET_OFF;

  let seg=null,angle=0;
  if(COLL_SEGS.length){

function _onWalkableTop(pl,plat){

function _applySlopePhysics(pl){
  if(!pl||(pl.hook&&pl.hook.st==='on')||pl.wallGrip>0) return;
  const surf=_surfaceUnderFeet(pl);
  if(!surf){pl._onSlope=false;pl._slopeAngle=0;pl._groundSeg=null;return;}
  const feet=pl.y+FEET_OFF;
  const gap=surf.y-feet;
  const rising=pl.vy<-0.4;
  const nearSurf=gap>=-6&&gap<=Math.max(18,COLL_LEDGE_STEP);
  const onGround=pl.og||(!rising&&nearSurf&&pl.vy>=0);
  const ang=surf.seg?surf.seg.angle:0;
  const isSlope=Math.abs(ang)>0.09;
  if(onGround&&!rising&&nearSurf){
    pl.y=surf.y-FEET_OFF;
    if(pl.vy>0.35) pl.vy=0;
    pl.og=true;
    pl._groundSeg=surf.seg||null;
  }
  if(onGround&&isSlope){
    pl._onSlope=true;
    pl._slopeAngle=ang;
    const driving=pl===p&&_moveInputX()!==0;
    if(!driving){
      const slideDir=Math.sign(Math.sin(ang))||1;
      const uphill=(slideDir>0&&isLf())||(slideDir<0&&isRt());
      const downhill=(slideDir>0&&isRt())||(slideDir<0&&isLf());
      if(!uphill) pl.vx+=GRAV*Math.sin(ang)*0.28;
      if(uphill) pl.vx*=0.82;
      if(downhill&&Math.abs(pl.vx)<RUN*0.5) pl.vx+=slideDir*0.05;
      const slopeCap=RUN*1.05;
      pl.vx=Math.max(-slopeCap,Math.min(slopeCap,pl.vx));
      const ducking=pl.crouchInput||(pl.crouchAmt||0)>0.25||(pl===p&&pl.og&&isDn());
      if(ducking){
        const duckAmt=Math.max(pl.crouchAmt||0,pl.crouchInput?0.9:0.5);
        pl.vx*=Math.pow(0.52,1+duckAmt*1.5);
        if(Math.abs(pl.vx)<0.07) pl.vx=0;
      }else if(!isLf()&&!isRt()){
        pl.vx*=0.85;if(Math.abs(pl.vx)<0.12)pl.vx=0;
      }
    }
    if(Math.abs(ang)>0.45&&Math.abs(pl.vx)>RUN&&!driving) pl.vx*=0.92;
    if(pl.vy>2) pl.vy=Math.min(pl.vy,2);
  }else{
    pl._onSlope=false;
    if(!isSlope) pl._slopeAngle=0;
  }
}
// Wheel is round: if its center hangs past a ledge, roll off the edge.
// Ducking acts as a brake and grips the edge instead.
function _wheelEdgeRoll(pl){
  if(!pl||!pl.og) return;
  if(pl.hook&&pl.hook.st==='on') return;
  if(pl._onSlope) return;
  if(Math.abs(pl.vx||0)<1.15) return;
  const ducked=(pl.crouchAmt||0)>0.25||(pl===p&&!!pl.crouchInput);
  if(ducked) return;
  const cx=pl.x+SW/2;
  const feet=pl.y+FEET_OFF;
  let centerOn=false, rim=null;
  for(const q of allP()){
    if(q.tp!=='solid'&&q.tp!=='oneway') continue;
    if(Math.abs(feet-q.y)>8) continue;
    if(cx>=q.x&&cx<=q.x+q.w){centerOn=true;break;}
    if(cx>q.x+q.w&&cx<q.x+q.w+WHEEL_R){
      const d=cx-(q.x+q.w);
      if(!rim||d<rim.d) rim={d,dir:1};
    }else if(cx<q.x&&cx>q.x-WHEEL_R){
      const d=q.x-cx;
      if(!rim||d<rim.d) rim={d,dir:-1};
    }
  }
  if(centerOn||!rim) return;
  // Center of mass is past the edge — gravity rolls the wheel off.
  const lean=rim.d/WHEEL_R;
  pl.vx+=rim.dir*(0.12+lean*0.3);
  if(lean>0.55){pl.og=false;pl.vy=Math.max(pl.vy,0.4);}
}
function _feetSpanOver(plat,fL,fR,seam=COLL_SEAM){

function _feetPlatSpan(pl,plat,seam=COLL_SEAM){

function _mergeCollRects(rects,gap=COLL_SEAM){
  const solid=rects.filter(r=>(Array.isArray(r)?r[4]:r.tp||'solid')==='solid').map(r=>{
    if(Array.isArray(r)) return r.slice();
    const out=[r.x,r.y,r.w,r.h,r.tp||'solid'];
    if(r.poly) out[5]='poly';
    return out;
  });
  const other=rects.filter(r=>(Array.isArray(r)?r[4]:r.tp||'solid')!=='solid');
  let changed=true;
  while(changed){
    changed=false;
    outer:for(let i=0;i<solid.length;i++){
      for(let j=i+1;j<solid.length;j++){
        const a=solid[i],b=solid[j];
        if(Math.abs(a[1]-b[1])<=gap&&Math.abs(a[3]-b[3])<=gap){
          const aR=a[0]+a[2],bR=b[0]+b[2];
          if(aR>=b[0]-gap&&a[0]<=bR+gap){
            const nx=Math.min(a[0],b[0]), nr=Math.max(aR,bR);
            solid[i]=[nx,Math.min(a[1],b[1]),nr-nx,Math.max(a[3],b[3]),'solid',(a[5]==='poly'||b[5]==='poly')?'poly':a[5]||b[5]];
            solid.splice(j,1);changed=true;break outer;
          }
        }
        if(Math.abs(a[0]-b[0])<=gap&&Math.abs(a[2]-b[2])<=gap){
          const aB=a[1]+a[3],bB=b[1]+b[3];
          if(aB>=b[1]-gap&&a[1]<=bB+gap){
            const ny=Math.min(a[1],b[1]), nb=Math.max(aB,bB);
            solid[i]=[a[0],ny,a[2],nb-ny,'solid',(a[5]==='poly'||b[5]==='poly')?'poly':a[5]||b[5]];
            solid.splice(j,1);changed=true;break outer;
          }
        }
      }
    }
  }

}
function allP(){

}

function _resolvePlatBodyX(pl,plat){
  if(plat.tp!=='solid') return false;
  const feet=pl.y+FEET_OFF;
  const fL=pl.x+FEET_L,fR=fL+FEET_W;
  // Standing on a surface — not a side wall (fixes TMJ floor polys zeroing vx every frame).
  if(_feetSpanOver(plat,fL,fR,8)&&feet>=plat.y-14&&feet<=plat.y+24) return false;
  if(_playerStandingOnPlat(pl,plat)) return false;
  if(plat.poly&&_useSegGround){
    if(_onWalkableTop(pl,plat)) return false;
    const surf=_walkableYForPlayer(pl);
    if(surf!==null){
      if(feet<=surf+28&&plat.h<=32) return false;
      if((pl.og||pl.vy>=0)&&Math.abs(feet-surf)<22) return false;
    }
  }
  const h=playerCoreHB(pl);
  if(!ov(h.x,h.y,h.w,h.h,plat.x,plat.y,plat.w,plat.h)) return false;
  const penL=(h.x+h.w)-plat.x, penR=(plat.x+plat.w)-h.x;

function resolveBodyX(pl){
  for(let pass=0;pass<4;pass++){
    let moved=false;
    for(const plat of allP()){
      if(plat.tp!=='solid')continue;
      if(_resolvePlatBodyX(pl,plat)) moved=true;
    }
    const h=playerCoreHB(pl);
    for(const c of CRATES){
      if(!ov(h.x,h.y,h.w,h.h,c.x,c.y,c.w,c.h))continue;
      const penL=(h.x+h.w)-c.x, penR=(c.x+c.w)-h.x;
      const push=Math.min(penL,penR,8);

  }

    if(plat.tp!=='solid') continue;
    if(bodyB<=plat.y+8||bodyT>=plat.y+plat.h-8) continue;
    if(bodyL<=plat.x+plat.w+10&&bodyL>=plat.x+plat.w-18) return {touch:true,dir:-1};
    if(bodyR>=plat.x-10&&bodyR<=plat.x+18) return {touch:true,dir:1};
  }
  return {touch:false,dir:0};
}
function _faceAwayFromWall(pl){
  pl.fc=pl.wallDir<0;
  if(!pl._hasAimInput){
    pl.aimDX=pl.fc?1:-1;
    pl.aimDY=0;
    pl.tAimDX=pl.aimDX;
    pl.tAimDY=0;
  }
}
function _wallJumpOff(pl){
  pl.vy=JI;
  pl.jf=JMH;
  pl.vx=-pl.wallDir*WLK;
  pl.wallGrip=0;
  pl._wallChargeReady=false;
  pl._wallJumpTap=0;
  pl.og=false;
  _faceAwayFromWall(pl);
  pl._wallAimFree=20;

}
function resY(prevFeet){ resolvePlatY(p,prevFeet); }

function resolvePlatY(pl,prevFeet){
  const wasOg=pl.og; pl.og=false;
  const feet=pl.y+FEET_OFF;
  const fL=pl.x+FEET_L,fR=fL+FEET_W;
  const h=playerCoreHB(pl);
  const landSlop=Math.max(12,Math.abs(pl.vy)+10);

  if(pl.vy>=0){
    let bestTop=null;
    const slopeSurf=_querySegGround(pl,feet,prevFeet,landSlop);
    if(slopeSurf){
      bestTop=slopeSurf.y;
      pl._groundSeg=slopeSurf.seg;
      pl._slopeAngle=slopeSurf.angle;
      pl._onSlope=Math.abs(slopeSurf.angle)>0.09;
    }
    for(const plat of allP()){
      if(plat.tp!=='solid') continue;
      if(plat.poly&&_useSegGround&&bestTop!==null) continue;
      if(!_feetSpanOver(plat,fL,fR)) continue;
      if(prevFeet>plat.y+landSlop) continue;
      if(feet<plat.y-6) continue;
      if(feet>plat.y+plat.h) continue;
      if(bestTop===null||plat.y>bestTop) bestTop=plat.y;
    }
    if(bestTop!==null){
      if(pl.hook&&pl.hook.st==='on') return;
      const landVy=pl.vy;
      const impactVy=Math.max(landVy,pl._peakVy||0);
      pl._peakVy=0;
      pl.y=bestTop-FEET_OFF; pl.vy=0; pl.og=true;
      if(!wasOg){
        const landAmp=Math.min(1,Math.max(0.22,impactVy/10));
        pl._landAmp=landAmp;
        pl.landF=Math.round(10+landAmp*22);
        pl.jumpTiltF=0;
        pl.suspComp=Math.min(1,Math.max(pl.suspComp||0,landAmp*0.82));
        pl.suspVel=Math.max(pl.suspVel||0,landAmp*0.14);
        if(pl===p&&!(pl.hook&&pl.hook.st==='on')){
          sfx('land');
        }
      }
      if(landVy>5.5) pl.vy=-Math.min(0.9,landVy*0.08);
      return;
    }
  }

  for(const plat of allP()){
    if(plat.tp==='oneway'){
      if(pl.hook&&pl.hook.st==='on') continue;
      if(pl.vy>=0&&_feetSpanOver(plat,fL,fR)&&prevFeet<=plat.y+landSlop&&feet>=plat.y-2){
        pl.y=plat.y-FEET_OFF; pl.vy=0; pl.og=true;
        if(plat.mv) pl.x+=plat.mv.dx;
        if(plat.mp) pl.x+=plat.mp.vx*0.5;
      }
    }else if(plat.tp==='solid'||plat.tp==='ceil'){
      const head=playerHeadWorld(pl);
      if(pl.vy<0&&_circleRectOverlap(head.cx,head.cy,head.r,plat.x,plat.y,plat.w,plat.h)){
        const ceilB=plat.y+plat.h;
        const headTop=head.cy-head.r;
        if(headTop<ceilB){pl.y+=ceilB-headTop;pl.vy=0;pl._autoHeadTuck=Math.min(1,(pl._autoHeadTuck||0)+0.18);}
      }else if(ov(h.x,h.y,h.w,h.h,plat.x,plat.y,plat.w,plat.h)&&pl.vy<0){
        pl.y=plat.y+plat.h-(FEET_OFF-(pl===p?hbH(pl.crouchAmt):STAND_H));
        pl.vy=0;
      }
    }
  }
}

function _resolvePlayerInSolids(pl){
  if(!pl) return;
  const feet=pl.y+FEET_OFF;
  for(let pass=0;pass<6;pass++){
    const h=playerCoreHB(pl);
    let moved=false;
    for(const plat of allP()){
      if(plat.tp!=='solid') continue;
      if(plat.poly&&_useSegGround){
        if(_onWalkableTop(pl,plat)) continue;
        const surf=_walkableYForPlayer(pl);
        if(surf!==null&&feet<=surf+28&&plat.h<=32) continue;
      }
      if(!ov(h.x,h.y,h.w,h.h,plat.x,plat.y,plat.w,plat.h)) continue;
      if(_playerStandingOnPlat(pl,plat)&&!plat.poly) continue;
      const overlapX=Math.min(h.x+h.w,plat.x+plat.w)-Math.max(h.x,plat.x);
      const overlapY=Math.min(h.y+h.h,plat.y+plat.h)-Math.max(h.y,plat.y);
      if(overlapX<=0||overlapY<=0) continue;
      const fromLeft=h.x+h.w/2<plat.x+plat.w/2;
      const horiz=overlapX<=overlapY||plat.h<=18;
      if(horiz){
        pl.x+=fromLeft?-overlapX:overlapX;
      }else if(feet<=plat.y+18||h.y+h.h*0.5<=plat.y+plat.h*0.35){
        pl.y-=overlapY;
        if(pl.vy>0) pl.vy*=0.5;
      }else{
        continue;
      }
      moved=true;
    }
    pl.x=Math.max(0,Math.min(WW-SW,pl.x));
    if(!moved) break;
  }
}

function _recoverFromInterior(pl){
  if(!pl||!COLL_POLYS.length) return;
  const cx=pl.x+SW/2, feet=pl.y+FEET_OFF;
  for(const pts of COLL_POLYS){
    if(!_pointInPoly(cx,feet+6,pts)) continue;
    const surf=_walkableYForPlayer(pl);
    if(surf!==null&&feet>surf+6){
      pl.y=surf-FEET_OFF;
      pl.vy=0; pl.vx*=0.5; pl.og=true;
      return;
    }
  }
}

function _enforceGroundContact(pl){
  if(!pl||pl.vy<-0.5) return;
  if(pl.hook&&pl.hook.st==='on') return;
  if(pl.wallGrip>0) return;
  const surf=_walkableYForPlayer(pl);
  if(surf===null) return;
  const feet=pl.y+FEET_OFF;
  if(feet>=surf-12&&feet<=surf+COLL_LEDGE_STEP){
    pl.y=surf-FEET_OFF;
    if(pl.vy>0) pl.vy=0;
    pl.og=true;
  }
}

function _movePlayerWithColl(pl,vx,vy){
  const stepSz=(pl===p&&(Math.abs(vx)>WLK+0.5||Math.abs(vy)>8))?2:COLL_MOVE_STEP;
  const steps=Math.max(1,Math.ceil(Math.max(Math.abs(vx),Math.abs(vy))/stepSz));
  for(let i=0;i<steps;i++){
    const sx=vx/steps, sy=vy/steps;
    pl.x+=sx;
    if(pl.x<0){pl.x=0;pl.vx=0;}
    if(pl.x>WW-SW){pl.x=WW-SW;pl.vx=0;}
    resolveBodyX(pl);
    const pf=pl.y+FEET_OFF;
    pl.y+=sy;
    resolvePlatY(pl,pf);
    if(pl.og&&sy>0) break;
  }
  if(!pl.og&&pl.vy>=0&&pl.vy<4){
    const surf=_walkableYForPlayer(pl);
    if(surf!==null){
      const feet=pl.y+FEET_OFF;
      if(feet>=surf-8&&feet<=surf+COLL_LEDGE_STEP){
        pl.y=surf-FEET_OFF; pl.vy=0; pl.og=true;
      }
    }
  }
}

function _stabilizePlayerCollision(pl){
  if(!pl) return;
  if(pl.hook&&pl.hook.st==='on') return;
  if(pl.wallGrip>0) return;
  _resolvePlayerInSolids(pl);
  _recoverFromInterior(pl);
  _applyWheelGroundContact(pl);
  _enforceGroundContact(pl);
  _resolveHeadCeiling(pl);
  _applySlopePhysics(pl);
}

function segHit(x1,y1,x2,y2,pl){
  const hit=_segAabbHit(x1,y1,x2,y2,pl);
  return hit?{tx:hit.tx,ty:hit.ty}:null;
}
function _segAabbHit(x1,y1,x2,y2,pl){
  const rx=pl.x, ry=pl.y, rw=pl.w, rh=pl.h;
  const edges=[
    {x1:rx,y1:ry,x2:rx,y2:ry+rh,nx:-1,ny:0},
    {x1:rx+rw,y1:ry,x2:rx+rw,y2:ry+rh,nx:1,ny:0},
    {x1:rx,y1:ry,x2:rx+rw,y2:ry,nx:0,ny:-1},
    {x1:rx,y1:ry+rh,x2:rx+rw,y2:ry+rh,nx:0,ny:1}
  ];
  const ex=x2-x1, ey=y2-y1;
  let best=null, bestT=1;
  for(const e of edges){
    const fx=e.x2-e.x1, fy=e.y2-e.y1, dn=ex*fy-ey*fx;
    if(Math.abs(dn)<.001) continue;
    const t=((e.x1-x1)*fy-(e.y1-y1)*fx)/dn;
    const u=((e.x1-x1)*ey-(e.y1-y1)*ex)/dn;
    if(t>=0&&t<=1&&u>=0&&u<=1&&t<bestT){
      bestT=t;
      best={tx:x1+t*ex, ty:y1+t*ey, nx:e.nx, ny:e.ny};
    }
  }
  return best;
}

function fireItem(charged=false){

      sfx('laser');p.flashF=7;p.fireRecoil=recoilAmt;p.fireRecoilA=shotA;

  }

function hookAttachWorld(){

function _knowlTreeBoostMul(pl){
  if(!_knowlTreeZone||!pl) return 1;
  const cx=pl.x+SW/2, cy=pl.y+FEET_OFF*0.48;
  const dx=cx-_knowlTreeZone.x, dy=cy-_knowlTreeZone.y;
  return dx*dx+dy*dy<=_knowlTreeZone.r*_knowlTreeZone.r?KNOWL_TREE_BOOST:1;
}
function _nearKnowlTree(pl){return _knowlTreeBoostMul(pl)>1;}

function _ropeColliders(){
  const out=[];
  for(const q of allP()) if(q.tp==='solid'||q.tp==='ceil') out.push(q);
  for(const c of CRATES) out.push({x:c.x,y:c.y,w:c.w,h:c.h,tp:'solid'});
  for(const bw of BWALLS){
    if(bw.hp<=0) continue;
    out.push({x:bw.x,y:bw.y,w:bw.w,h:bw.h,tp:'solid'});
  }
  return out;
}
// Ray probe for push/pull wall & floor reactions.
function _raySolidDist(x,y,ux,uy,maxD,step=7){
  const len=Math.hypot(ux,uy)||1;
  ux/=len; uy/=len;
  let best=maxD+1;
  for(let t=step;t<=maxD;t+=step){
    const px=x+ux*t, py=y+uy*t;
    for(const q of allP()){
      if(q.tp!=='solid'&&q.tp!=='ceil') continue;
      if(px>=q.x&&px<=q.x+q.w&&py>=q.y&&py<=q.y+q.h){best=Math.min(best,t);break;}
    }
    if(best<=maxD) break;
    for(const bw of BWALLS){
      if(bw.hp<=0||bw.movable) continue;
      if(px>=bw.x&&px<=bw.x+bw.w&&py>=bw.y&&py<=bw.y+bw.h){best=Math.min(best,t);break;}
    }
    if(best<=maxD) break;
  }
  return best;
}
function _pullTargetBlocked(ox,oy,tox,toy,w,h){
  const mx=ox+(tox-ox)*0.38, my=oy+(toy-oy)*0.38;
  const hw=(w||28)*0.5, hh=(h||28)*0.5;
  for(const q of allP()){
    if(q.tp!=='solid'&&q.tp!=='ceil') continue;
    if(ov(mx-hw,my-hh,w||28,h||28,q.x,q.y,q.w,q.h)) return true;
  }
  for(const bw of BWALLS){
    if(bw.hp<=0||!bw.movable) continue;
    if(ov(mx-hw,my-hh,w||28,h||28,bw.x,bw.y,bw.w,bw.h)) return true;
  }
  return false;
}
function _applyPushWallReaction(pl,originX,originY,aimA,range,held){
  if(pl.hook&&pl.hook.st==='on') return;
  const ux=Math.cos(aimA), uy=Math.sin(aimA);
  const holdScale=Math.min(1,(held||0)/180)*1.5+1;
  const block=_raySolidDist(originX,originY,ux,uy,range);
  if(block<=range){
    const prox=Math.pow(1-block/range,1.65);
    const react=prox*2.5*holdScale;
    pl.vx-=ux*react;
    pl.vy-=uy*react*0.9;
  }
  const core=cpt();
  if(uy>0.35){
    const floorD=_raySolidDist(core.x,pl.y+FEET_OFF,0,1,44,5);
    if(floorD<38){
      const prox=Math.pow(1-floorD/38,1.45);
      pl.vy-=prox*1.7*holdScale;
    }
  }
  if(uy<-0.35){
    const headY=pl.y+FEET_OFF-STAND_H+6;
    const ceilD=_raySolidDist(core.x,headY,0,-1,40,5);
    if(ceilD<34){
      const prox=Math.pow(1-ceilD/34,1.45);
      pl.vy+=prox*1.5*holdScale;
    }
  }
}
function _applyPullPlayerTug(pl,centerX,centerY,fx,fy,ox,oy,w,h,range,blockedOnly){
  if(pl.hook&&pl.hook.st==='on') return {x:0,y:0,w:0};
  const dx=ox-centerX, dy=oy-centerY, dist=Math.hypot(dx,dy)||1;
  if(dist>range) return {x:0,y:0,w:0};
  const blocked=_pullTargetBlocked(ox,oy,centerX,centerY,w,h);
  const stuckNear=dist<58;
  if(blockedOnly&&!blocked&&!stuckNear) return {x:0,y:0,w:0};
  const prox=Math.pow(1-dist/range,1.25);
  const boost=blocked?2.6:(stuckNear?1.35:0.55);
  return {x:(dx/dist)*fx*prox*boost,y:(dy/dist)*fy*prox*boost,w:prox*boost};
}
function _ropePathLen(pts){
  let len=0;
  for(let i=1;i<pts.length;i++) len+=Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y);
  return len;
}
function _segPathClear(x1,y1,x2,y2){
  for(const q of _ropeColliders()){
    if(_segAabbHit(x1,y1,x2,y2,q)) return false;
  }
  return true;
}
function _ropeNearestCorner(rect,hx,hy){
  const cs=[
    {x:rect.x,y:rect.y},{x:rect.x+rect.w,y:rect.y},
    {x:rect.x,y:rect.y+rect.h},{x:rect.x+rect.w,y:rect.y+rect.h}
  ];
  let best=cs[0],bd=1e18;
  for(const c of cs){
    const d=(c.x-hx)*(c.x-hx)+(c.y-hy)*(c.y-hy);
    if(d<bd){bd=d;best=c;}
  }
  // Nudge just outside the block so clear-line checks pass.
  const cx=rect.x+rect.w*0.5, cy=rect.y+rect.h*0.5;
  return {x:best.x+(best.x>cx?2.5:-2.5),y:best.y+(best.y>cy?2.5:-2.5)};
}
function _ropeFirstHit(x1,y1,x2,y2){
  let best=null,bt=1;
  const segLen=Math.hypot(x2-x1,y2-y1)||1;
  for(const q of _ropeColliders()){
    const hit=_segAabbHit(x1,y1,x2,y2,q);
    if(!hit) continue;
    const t=Math.hypot(hit.tx-x1,hit.ty-y1)/segLen;
    if(t<bt){bt=t;best={hit,rect:q};}
  }
  return best;
}
// Clearance test with endpoints pulled in slightly, so a point resting
// on a surface (anchor, pivot, RCA tip near ground) doesn't self-block.
function _ropeSegClear(x1,y1,x2,y2){
  const d=Math.hypot(x2-x1,y2-y1);
  if(d<8) return true;
  const ux=(x2-x1)/d, uy=(y2-y1)/d;
  return _segPathClear(x1+ux*3,y1+uy*3,x2-ux*3,y2-uy*3);
}
// Pendulum-style wrap: pivots accumulate as the rope sweeps across
// corners, and unwind when the swing comes back around.
function _ropeUpdatePivots(h,tx,ty){
  if(!h.pivots) h.pivots=[];
  for(let g=0; g<3 && h.pivots.length; g++){
    const n=h.pivots.length;
    const base=n>=2?h.pivots[n-2]:{x:h.ax,y:h.ay};
    if(_ropeSegClear(base.x,base.y,tx,ty)) h.pivots.pop();
    else break;
  }
  for(let g=0; g<3; g++){
    const base=h.pivots.length?h.pivots[h.pivots.length-1]:{x:h.ax,y:h.ay};
    if(_ropeSegClear(base.x,base.y,tx,ty)) break;
    if(h.pivots.length>=ROPE_MAX_PIVOTS) break;
    const d=Math.hypot(tx-base.x,ty-base.y)||1;
    const ux=(tx-base.x)/d, uy=(ty-base.y)/d;
    const fh=_ropeFirstHit(base.x+ux*3,base.y+uy*3,tx-ux*3,ty-uy*3);
    if(!fh) break;
    const c=_ropeNearestCorner(fh.rect,fh.hit.tx,fh.hit.ty);
    if(Math.hypot(c.x-base.x,c.y-base.y)<3) break;
    h.pivots.push(c);
  }
}
function _ropePathPts(h,tx,ty){
  const pts=[{x:h.ax,y:h.ay}];
  if(h.pivots) for(const pv of h.pivots) pts.push({x:pv.x,y:pv.y});
  pts.push({x:tx,y:ty});
  return pts;
}
// Floor contact while swinging: feet stop on solid tops (no landing
// effects, rope stays attached — you just can't pass through).
function _ropeSolidFloor(pl,prevFeet){
  if(pl.vy<0) return;
  const feet=pl.y+FEET_OFF;
  const fL=pl.x+FEET_L,fR=fL+FEET_W;
  const landSlop=Math.max(12,Math.abs(pl.vy)+10);
  let bestTop=null;
  const slopeSurf=_querySegGround(pl,feet,prevFeet,landSlop);
  if(slopeSurf) bestTop=slopeSurf.y;
  for(const plat of allP()){
    if(plat.tp!=='solid') continue;
    if(!_feetSpanOver(plat,fL,fR)) continue;
    if(prevFeet>plat.y+landSlop) continue;
    if(feet<plat.y-6) continue;
    if(feet>plat.y+plat.h) continue;
    if(bestTop===null||plat.y>bestTop) bestTop=plat.y;
  }
  if(bestTop!==null&&feet>bestTop){
    pl.y=bestTop-FEET_OFF;
    if(pl.vy>0) pl.vy=0;
  }
}
function _ropeRefreshPath(h){
  const end=ropePlayerEndWorld();
  _ropeUpdatePivots(h,end.x,end.y);
  const path=_ropePathPts(h,end.x,end.y);
  h._path=path;
  return path;
}
function _ropeApplyTension(h){
  const path=_ropeRefreshPath(h);
  const plen=_ropePathLen(path);
  const over=plen-h.rl;
  h._tension=Math.max(0,over);
  h._slack=over<-4;
  h._tight=over>1;
  if(over<=0) return;
  const i=path.length-2;
  const p0=path[i], p1=path[i+1];
  const seg=Math.hypot(p1.x-p0.x,p1.y-p0.y)||1;
  const toAx=(p0.x-p1.x)/seg, toAy=(p0.y-p1.y)/seg;
  const spring=Math.min(over*0.12,2.4);
  p.vx+=toAx*spring;
  p.vy+=toAy*spring;
  const outX=(p1.x-p0.x)/seg, outY=(p1.y-p0.y)/seg;
  const vd=p.vx*outX+p.vy*outY;
  // Rubber give: near rest length the cord stretches almost freely and the
  // spring rebounds you (bungee); only when well over-stretched does the
  // radial damping clamp down hard like a taut cord.
  if(vd>0){const k=0.88*Math.min(1,over/ROPE_GIVE);p.vx-=outX*vd*k;p.vy-=outY*vd*k;}
}

// ── Visual rubber cord ──────────────────────────────────────────
// A verlet particle chain that carries the cord's LOOK: it sags and
// jiggles when slack, bunches when reeled in, pulls straight and thin
// when taut, and wraps pivots by being drawn toward the physics path.
// Gameplay forces stay in _ropeApplyTension; this never pushes the player.
function _pathPointAt(path,plen,d){
  if(d<=0) return {x:path[0].x,y:path[0].y};
  let acc=0;
  for(let i=1;i<path.length;i++){
    const sl=Math.hypot(path[i].x-path[i-1].x,path[i].y-path[i-1].y);
    if(acc+sl>=d){
      const t=sl>0?(d-acc)/sl:0;
      return {x:path[i-1].x+(path[i].x-path[i-1].x)*t,y:path[i-1].y+(path[i].y-path[i-1].y)*t};
    }
    acc+=sl;
  }
  const lp=path[path.length-1];
  return {x:lp.x,y:lp.y};
}
function _vropeStep(h){
  const path=h._path;
  if(!path||path.length<2) return;
  const plen=_ropePathLen(path);
  const rl=Math.max(h.rl,ROPE_RL_MIN);
  const end=path[path.length-1];
  if(!h.vr){
    h.vr=[];
    for(let i=0;i<VROPE_N;i++){
      const t=i/(VROPE_N-1);
      const x=h.ax+(end.x-h.ax)*t, y=h.ay+(end.y-h.ay)*t;
      h.vr.push({x,y,px:x,py:y});
    }
  }
  const vr=h.vr, n=vr.length;
  // Verlet integrate the cord body (ends are pinned below).
  for(let i=1;i<n-1;i++){
    const q=vr[i];
    const vx=(q.x-q.px)*VROPE_DRAG, vy=(q.y-q.py)*VROPE_DRAG;
    q.px=q.x; q.py=q.y;
    q.x+=vx; q.y+=vy+VROPE_GRAV;
  }
  vr[0].x=vr[0].px=h.ax; vr[0].y=vr[0].py=h.ay;
  vr[n-1].x=vr[n-1].px=end.x; vr[n-1].y=vr[n-1].py=end.y;
  // Slack cord keeps its full reeled-out length (rl) and droops with the
  // extra; taut cord spans the stretched path length (visibly stretched).
  const segRest=Math.max(plen,rl)/(n-1);
  for(let it=0;it<VROPE_ITER;it++){
    for(let i=0;i<n-1;i++){
      const a=vr[i],b=vr[i+1];
      const dx=b.x-a.x,dy=b.y-a.y;
      const d=Math.hypot(dx,dy)||1e-6;
      const f=(d-segRest)/d*0.5;
      const ox=dx*f,oy=dy*f;
      if(i>0){a.x+=ox;a.y+=oy;}
      if(i+1<n-1){b.x-=ox;b.y-=oy;}
    }
  }
  // Pull the cord toward the wrapped physics path as it tautens, so it
  // hugs pivot corners; capped below 1 so taut rope keeps a live wobble.
  const taut=Math.min(1,Math.max(0,(plen-rl+4)/10));
  const pull=Math.min(0.85,Math.max(taut*0.85,path.length>2?0.35:0));
  if(pull>0){
    for(let i=1;i<n-1;i++){
      const q=vr[i];
      const tp=_pathPointAt(path,plen,plen*i/(n-1));
      q.x+=(tp.x-q.x)*pull;
      q.y+=(tp.y-q.y)*pull;
    }
  }
  // Slack cord rests on (and slides along) solid ground instead of clipping.
  const cols=_ropeColliders();
  for(let i=1;i<n-1;i++){
    const q=vr[i];
    for(const r of cols){
      if(q.x>r.x&&q.x<r.x+r.w&&q.y>r.y&&q.y<r.y+r.h){
        const dl=q.x-r.x, dr=r.x+r.w-q.x, dt=q.y-r.y, db=r.y+r.h-q.y;
        const m=Math.min(dl,dr,dt,db);
        if(m===dt) q.y=r.y; else if(m===db) q.y=r.y+r.h;
        else if(m===dl) q.x=r.x; else q.x=r.x+r.w;
        // surface friction
        q.px+=(q.x-q.px)*0.4; q.py+=(q.y-q.py)*0.4;
        break;
      }
    }
  }
  h._tautAmt=taut;
}

function connectorAimAngle(){
  const ca2=p.og?p.crouchAmt:0;
  const rawAngle=Math.atan2(p.aimDY,p.aimDX);
  const duckAngle=p.fc?0:Math.PI;
  return rawAngle*(1-ca2*0.85)+duckAngle*(ca2*0.85);
}

function _releaseHookAim(ax,ay){
  const adx=(K['KeyD']||(_playerCount===1&&K['ArrowRight'])?1:0)-(K['KeyA']||(_playerCount===1&&K['ArrowLeft'])?1:0);
  const ady=(K['KeyS']||(_playerCount===1&&K['ArrowDown'])?1:0)-(K['KeyW']||(_playerCount===1&&K['ArrowUp'])?1:0);
  if(adx||ady){
    const l=Math.hypot(adx,ady)||1;
    p.tAimDX=adx/l; p.tAimDY=ady/l;
  }else{
    const ox=p.x+SW/2, oy=p.y+FEET_OFF-STAND_H*0.5;
    let dx=ox-ax, dy=oy-ay;
    const d=Math.hypot(dx,dy)||1;
    if(d<4){ dx=p.wallDir?-p.wallDir:1; dy=-0.35; const l=Math.hypot(dx,dy)||1; dx/=l; dy/=l; }
    else { dx/=d; dy/=d; }
    p.tAimDX=dx; p.tAimDY=dy;
  }
  p.aimDX=p.tAimDX; p.aimDY=p.tAimDY;
  if(p.tAimDX>0.05)p.fc=true; else if(p.tAimDX<-0.05)p.fc=false;
  p._hasAimInput=true;
  p._wallAimFree=32;
}

function updateHook(){
  const h=p.hook,pl=allP();
  const _hookOff=()=>{h.st='idle';h.ox=NaN;h.oy=NaN;h._tight=false;h._slack=false;h._path=null;h._tension=0;h.pivots=null;h.vr=null;};
  const _aimHook=(tx,ty)=>{
    const ox=p.x+SW*0.5, oy=p.y+FEET_OFF-STAND_H*0.5;
    p.aimDX=tx-ox; p.aimDY=ty-oy;
    if(p.aimDX>0.05)p.fc=true; else if(p.aimDX<-0.05)p.fc=false;
  };

  if(h.st==='ext'){
    _aimHook(h.ex,h.ey);
    const px=h.ex,py=h.ey;
    const attach=ropePlayerEndWorld();
    h.ex+=h.evx;h.ey+=h.evy;
    if(Math.hypot(h.ex-attach.x,h.ey-attach.y)>CMAX){if(h.st==='on')_releaseHookAim(h.ax,h.ay);_hookOff();return;}
    let best=null,bestD=1e9;
    for(const q of pl){
      if(q.tp!=='solid'&&q.tp!=='ceil')continue;
      const hit=_segAabbHit(px,py,h.ex,h.ey,q);
      if(!hit)continue;
      const d=Math.hypot(hit.tx-px,hit.ty-py);
      if(d<bestD){bestD=d;best=hit;}
    }
    if(best){
      // Anchor sits 2px off the surface so the rope's own collision
      // checks don't see the latched block as an obstacle.
      h.ax=best.tx+(best.nx||0)*2;h.ay=best.ty+(best.ny||0)*2;
      h.ex=best.tx;h.ey=best.ty;
      const a2=ropePlayerEndWorld();
      h.pivots=[];
      h.vr=null;
      h.rl=Math.max(Math.hypot(h.ax-a2.x,h.ay-a2.y),ROPE_RL_MIN);
      h._path=[{x:h.ax,y:h.ay},{x:a2.x,y:a2.y}];
      h._tension=0;h._slack=true;h._tight=false;
      h._grace=14;
      h.st='on';
      if(p.vy>0)p.vy*=0.2;
      sfx('hook_latch');
    }
    return;
  }

  if(h.st==='on'){
    p.wallGrip=0;
    if(!p._hasAimInput) _aimHook(h.ax,h.ay);

    // Space = Worms-style catapult release.
    if(isJumpJ()){
      const a=ropePlayerEndWorld();
      const dx=h.ax-a.x, dy=h.ay-a.y;
      const d=Math.hypot(dx,dy)||1;
      const boost=5.2;
      p.vx+=dx/d*boost;
      p.vy+=dy/d*boost;
      p.vy=Math.min(p.vy,JMX*0.85);
      _releaseHookAim(h.ax,h.ay);
      _hookOff();
      sfx('jump');
      OPT.binds.jump.forEach(c=>delete Kj[c]);
      return;
    }

    const wasTight=h._tight;
    const wasSlack=h._slack;
    if(isUp()) h.rl=Math.max(ROPE_RL_MIN,h.rl-ROPE_REEL_IN);
    if(isDn()) h.rl=Math.min(CMAX,h.rl+ROPE_REEL_OUT);
    if(isLf()){p.vx-=1.2;p.fc=false;}
    else if(isRt()){p.vx+=1.2;p.fc=true;}

    p.vy+=GRAV;
    p.vy=Math.min(p.vy,14);
    p.vx=Math.max(-14,Math.min(14,p.vx));
    p.vx*=0.999;
    p.vy*=0.999;
    // Substepped move so fast swings can't tunnel through walls/floors.
    const _rSteps=Math.max(1,Math.ceil(Math.max(Math.abs(p.vx),Math.abs(p.vy))/3));
    for(let _ri=0;_ri<_rSteps;_ri++){
      p.x+=p.vx/_rSteps;
      if(p.x<0){p.x=0;p.vx=0;}
      if(p.x>WW-SW){p.x=WW-SW;p.vx=0;}
      resX();
      const _pf=p.y+FEET_OFF;
      p.y+=p.vy/_rSteps;
      _ropeSolidFloor(p,_pf);
      _resolveHeadCeiling(p);
    }
    _ropeApplyTension(h);
    resX();
    // Over-stretched rubber snaps — rope breaks, must latch again.
    if(h._grace>0) h._grace--;
    else if(h._tension>Math.max(ROPE_SNAP_MIN,h.rl*ROPE_SNAP_STRETCH)){
      _releaseHookAim(h.ax,h.ay);
      _hookOff();
      sfx('ropeBreak');
      return;
    }
    if(h._tight&&!wasTight&&Math.hypot(p.vx,p.vy)>2)sfx('ropeSnap');
    if(h._slack&&!wasSlack)sfx('ropeSlack');
    _vropeStep(h);

    p.og=false;
  }
}

function isUp(){return _bindDown('up');}
function isDn(){return _bindDown('down');}
function isLf(){return _bindDown('left');}
function isRt(){return _bindDown('right');}

// Sprint needs punch HELD ~10 frames — quick taps still punch without triggering a run.
let _punchHoldF=0,_punchHoldFr=-1;
function isSprintHeld(){
  if(fr!==_punchHoldFr){_punchHoldFr=fr;_punchHoldF=isPunch()?_punchHoldF+1:0;}
  return _punchHoldF>10&&((isRt()&&!isLf())||(isLf()&&!isRt()));
}
function _moveInputX(){
  if(_bindDown('right')&&!_bindDown('left')) return 1;
  if(_bindDown('left')&&!_bindDown('right')) return -1;
  const r=!!(K['KeyD']||K['ArrowRight']);
  const l=!!(K['KeyA']||K['ArrowLeft']);
  if(r&&!l) return 1;
  if(l&&!r) return -1;
  return 0;
}
function _updatePlayerMoveX(pl){
  if(pl!==p) return;
  if(_shutdownTimer>0) return;
  if(pl.hook&&pl.hook.st==='on') return;
  if(pl.wallGrip>0) return;

  const dir=_moveInputX();
  const grounded=!!(pl.og||_playerOnGround(pl));
  const sprint=isSprintHeld()&&grounded&&dir!==0;

  if(sprint){
    pl.runRamp=Math.min(1,(pl.runRamp||0)+MOVE_RUN_RAMP);
  }else{
    pl.runRamp=Math.max(0,(pl.runRamp||0)-0.1);
  }

  if(!dir){
    pl.movePower=Math.max(0,(pl.movePower||0)-0.22);
    if(pl.movePower<=0) pl._moveDir=0;
    pl._moveCap=0;
    if(grounded){
      pl.vx*=MOVE_STOP;
      if(Math.abs(pl.vx)<0.35) pl.vx=0;
    }else{
      pl.vx*=AIR_DRIFT;
      if(Math.abs(pl.vx)<0.12) pl.vx=0;
    }
    return;
  }

  if(pl._moveDir!==dir){ pl._moveDir=dir; pl.movePower=0.2; pl.vx*=0.4; }
  pl.movePower=Math.min(1,(pl.movePower||0)+MOVE_POWER);

  let cap;
  if(sprint){
    const runEase=Math.max(0.5,pl.runRamp||0);
    cap=MOVE_WALK+(MOVE_RUN-MOVE_WALK)*runEase;
  }else{
    const t=Math.min(1,pl.movePower||0);
    const ease=1-(1-t)*(1-t);
    cap=MOVE_WALK*MOVE_PEAK*ease;
    if(!grounded&&dir) cap=Math.max(cap,Math.abs(pl.vx));
  }
  pl._moveCap=cap;

  let accel=sprint?MOVE_RUN_ACCEL:MOVE_ACCEL;
  if(!sprint&&cap>0.05){
    const ratio=Math.min(1,Math.abs(pl.vx)/cap);
    accel*=1+MOVE_TORQUE*(1-ratio)*(1-ratio);
  }
  const vSign=pl.vx>0.15?1:(pl.vx<-0.15?-1:0);
  if(vSign===-dir){
    pl.vx+=dir*accel*MOVE_TURN;
  }else{
    pl.vx+=dir*accel;
  }
  if(dir>0) pl.vx=Math.min(pl.vx,cap);
  else pl.vx=Math.max(pl.vx,-cap);
}
function _restoreMoveAfterColl(pl){}
function _playerGrounded(pl){
  if(pl.og) return true;
  if(pl.hook&&pl.hook.st==='on') return false;
  if(pl.wallGrip>0) return false;
  if(pl.vy<-1.2) return false;
  const surf=_walkableYForPlayer(pl);
  if(surf===null) return false;
  return Math.abs((pl.y+FEET_OFF)-surf)<18;
}

  const dir=_runDir();

  const wall=_wallTouchInfo(pl);
  if(wall.touch&&wall.dir===dir) pl.vx=0;
}
