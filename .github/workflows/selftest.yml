name: MV self-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run selftest:quick
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selftest-report
          path: test-results/
