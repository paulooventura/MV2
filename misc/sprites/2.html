<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Idle Animation Sprite</title>
<style>
  body {
    background: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  #sprite {
    image-rendering: pixelated; /* crisp pixels */
    width: 128px;
    height: 128px;
    background-image: url('https://static.wixstatic.com/media/4aa02a_e924f332f3a84043a6e5f9d988343f2d~mv2.png');
    background-repeat: no-repeat;
    background-position: 0 0;
  }
</style>
</head>
<body>
<div id="sprite"></div>

<script>
  const sprite = document.getElementById('sprite');

  const frameWidth = 128;
  const frameHeight = 128;
  const totalFrames = 4; // 4 frames vertical
  let currentFrame = 0;
  const frameDuration = 250; // ms

  function updateFrame() {
    const posY = -frameHeight * currentFrame;
    sprite.style.backgroundPosition = `0px ${posY}px`;

    currentFrame++;
    if (currentFrame >= totalFrames) currentFrame = 0;
  }

  setInterval(updateFrame, frameDuration);
  updateFrame();
</script>
</body>
</html>
