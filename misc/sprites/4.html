<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><title>Canvas Sprite Demo</title></head>
<body>
<canvas id="spriteCanvas" width="64" height="64" style="border:1px solid black;"></canvas>
<script>
const canvas = document.getElementById('spriteCanvas');
const ctx = canvas.getContext('2d');

const sprite = new Image();
// Public domain vertical strip sprite (64x64 per frame, 4 frames)
sprite.src = 'https://i.imgur.com/6TkJqWu.png'; 

const frameWidth = 64;
const frameHeight = 64;
const totalFrames = 4;
let currentFrame = 0;
const frameDuration = 250;

function drawFrame(frame) {
  ctx.clearRect(0, 0, frameWidth, frameHeight);
  ctx.drawImage(sprite, 0, frameHeight * frame, frameWidth, frameHeight, 0, 0, frameWidth, frameHeight);
}

sprite.onload = () => {
  drawFrame(currentFrame);
  setInterval(() => {
    currentFrame = (currentFrame + 1) % totalFrames;
    drawFrame(currentFrame);
  }, frameDuration);
};
</script>
</body>
</html>
